<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Studios | Live</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rwpNPzBj/Frame-18.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .nbs-blue { color: #3b82f6; }
        .stat-card { border-left: 1px solid #1a1a1a; padding-left: 2rem; }
        .game-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; overflow: hidden; transition: 0.4s; }
        .game-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="max-w-7xl mx-auto px-8 py-10 flex justify-between items-center">
        <img src="https://i.postimg.cc/VLmRXK43/Group-29.png" alt="Nimbus Logo" class="h-10">
        <div class="flex items-center gap-10 font-bold uppercase tracking-tighter text-sm">
            <a href="#games" class="hover:text-blue-500 transition">Games</a>
            <a href="#about" class="hover:text-blue-500 transition">About Us</a>
            <a href="https://www.roblox.com/groups/9826231921" target="_blank" class="bg-blue-600 px-6 py-2 rounded-full hover:bg-blue-700 transition">Group Page</a>
        </div>
    </nav>

    <header class="text-center py-20 px-4">
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-4 uppercase">Nimbus <span class="nbs-blue">Studios</span></h1>
        <p class="text-zinc-500 text-xl font-medium italic tracking-widest uppercase">We make better games.</p>
    </header>

    <section class="max-w-7xl mx-auto px-8 py-16 grid grid-cols-1 md:grid-cols-4 gap-10 border-y border-zinc-900">
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Total Playing</p>
            <h2 id="total-playing" class="text-5xl font-black mt-2">--</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Total Visits</p>
            <h2 id="total-visits" class="text-5xl font-black mt-2">--</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Platform Share</p>
            <h2 id="platform-ccu" class="text-4xl font-black nbs-blue mt-2">--</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Network DAU</p>
            <h2 id="platform-dau" class="text-4xl font-black nbs-blue mt-2">--</h2>
        </div>
    </section>

    <section id="about" class="max-w-4xl mx-auto px-8 py-32 text-center">
        <h2 class="text-zinc-700 font-black text-xs uppercase tracking-[0.5em] mb-6">Our Mission</h2>
        <p class="text-3xl font-light leading-relaxed">
            Nimbus Studios is a high performance development collective focused on pushing the limits of the <span class="nbs-blue">Roblox Engine</span>.
        </p>
    </section>

    <section id="games" class="max-w-7xl mx-auto px-8 py-24">
        <h3 class="text-zinc-700 font-black text-xs uppercase tracking-[0.3em] mb-12 italic">Portfolio</h3>
        <div id="games-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </section>

    <footer class="p-20 text-center border-t border-zinc-950 bg-black">
        <p class="text-zinc-800 text-[10px] font-bold tracking-[0.5em] uppercase">&copy; 2026 Nimbus Studios</p>
    </footer>

    <script>
        const GAME_MAP = {
            "9248621375": "111865350831047",
            "9597132710": "129661264144098",
            "9464648181": "132769566461685",
            "9691359376": "97697276454887"
        };
        const UNIVERSE_IDS = Object.keys(GAME_MAP).join(',');

        function smartFormat(num) {
            if (!num) return "0";
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toLocaleString();
        }

        async function loadNimbusData() {
            try {
                // SINGLE BATCH FETCH (Prevents 403 Errors)
                const [statsRes, votesRes, thumbRes] = await Promise.all([
                    fetch(`https://games.roproxy.com/v1/games?universeIds=${UNIVERSE_IDS}`),
                    fetch(`https://games.roproxy.com/v1/games/votes?universeIds=${UNIVERSE_IDS}`),
                    fetch(`https://thumbnails.roproxy.com/v1/games/multiget/thumbnails?universeIds=${UNIVERSE_IDS}&size=768x432&format=Png`)
                ]);

                const stats = await statsRes.json();
                const votes = await votesRes.json();
                const thumbs = await thumbRes.json();

                let totalP = 0;
                let totalV = 0;
                let cardsHtml = "";

                stats.data.forEach((game, i) => {
                    const v = votes.data[i];
                    const t = thumbs.data[i].thumbnails[0].imageUrl;
                    const ratio = (v.upVotes + v.downVotes) > 0 ? Math.round((v.upVotes / (v.upVotes + v.downVotes)) * 100) : 0;
                    
                    totalP += game.playing;
                    totalV += game.visits;

                    cardsHtml += `
                        <div class="game-card flex flex-col md:flex-row">
                            <div class="md:w-1/2 h-64 bg-zinc-900">
                                <img src="${t}" class="w-full h-full object-cover">
                            </div>
                            <div class="p-10 md:w-1/2 flex flex-col justify-center">
                                <h4 class="text-3xl font-black uppercase tracking-tighter">${game.name}</h4>
                                <div class="grid grid-cols-2 gap-4 mt-6">
                                    <div><p class="text-zinc-500 text-[10px] font-bold">ACTIVE</p><p class="text-xl font-bold">${smartFormat(game.playing)}</p></div>
                                    <div><p class="text-zinc-500 text-[10px] font-bold">RATING</p><p class="text-xl font-bold text-green-500">${ratio}%</p></div>
                                </div>
                                <a href="https://www.roblox.com/games/${GAME_MAP[game.id]}" target="_blank" class="mt-8 block text-center border-2 border-white py-3 rounded-xl font-black hover:bg-white hover:text-black transition text-[10px] tracking-widest uppercase">Play</a>
                            </div>
                        </div>`;
                });

                document.getElementById('games-container').innerHTML = cardsHtml;
                document.getElementById('total-playing').innerText = smartFormat(totalP);
                document.getElementById('total-visits').innerText = smartFormat(totalV);
                document.getElementById('platform-ccu').innerText = (totalP / 12000000 * 100).toFixed(4) + "%";
                document.getElementById('platform-dau').innerText = (totalP * 1.5 / 150000000 * 100).toFixed(4) + "%";

            } catch (err) {
                console.error("403 Mitigation Active: Proxy is cooling down.");
            }
        }

        loadNimbusData();
        setInterval(loadNimbusData, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBS STUDIOS | LIVE DATA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; }
        .nbs-blue { color: #3b82f6; }
        .stat-card { border-left: 1px solid #1a1a1a; padding-left: 2rem; min-height: 100px; }
        .game-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; overflow: hidden; transition: 0.4s; }
        .game-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center p-8 max-w-7xl mx-auto">
        <img src="https://i.postimg.cc/VLmRXK43/Group-29.png" alt="NBS Logo" class="h-10">
        <div class="hidden md:flex gap-8 font-bold uppercase tracking-tighter text-sm">
            <a href="#" class="hover:text-blue-500">Analytics</a>
            <a href="https://www.roblox.com/groups/9826231921" class="bg-blue-600 px-6 py-2 rounded-full">Group Page</a>
        </div>
    </nav>

    <header class="text-center py-20 px-4">
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-4">NEXT BIG <span class="nbs-blue">STEP.</span></h1>
        <p class="text-zinc-500 text-xl font-medium italic">2026 Real-Time Platform Dashboard</p>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-16 grid grid-cols-1 md:grid-cols-4 gap-10 border-y border-zinc-900">
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Total Playing</p>
            <h2 id="total-playing" class="text-5xl font-black mt-2">--</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Total Visits</p>
            <h2 id="total-visits" class="text-5xl font-black mt-2">--</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">% of Platform CCU</p>
            <h2 id="platform-ccu" class="text-4xl font-black nbs-blue mt-2">0.00%</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">% of Platform DAU</p>
            <h2 id="platform-dau" class="text-4xl font-black nbs-blue mt-2">0.00%</h2>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-24">
        <h3 class="text-sm font-black mb-12 uppercase tracking-[0.3em] text-zinc-700">Studio Portfolio</h3>
        <div id="games-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="game-card flex flex-col md:flex-row">
                <div class="md:w-1/2 h-64 bg-zinc-900 overflow-hidden">
                    <img id="game-thumb" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-1000">
                </div>
                <div class="p-8 md:w-1/2 flex flex-col justify-center">
                    <h4 id="game-name" class="text-3xl font-black uppercase tracking-tighter">FETCHING...</h4>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div>
                            <p class="text-zinc-500 text-[10px] font-bold uppercase">Players</p>
                            <p id="game-players" class="text-xl font-bold">--</p>
                        </div>
                        <div>
                            <p class="text-zinc-500 text-[10px] font-bold uppercase">Rating</p>
                            <p id="game-likes" class="text-xl font-bold text-green-500">--</p>
                        </div>
                    </div>
                    <a id="game-link" href="#" class="mt-8 block text-center border border-zinc-800 py-3 rounded-xl font-bold hover:bg-white hover:text-black transition">LAUNCH REHAUL</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="p-10 text-center border-t border-zinc-900 bg-zinc-950/50">
        <img src="https://i.postimg.cc/rwpNPzBj/Frame-18.png" alt="NBS Blue" class="h-8 mx-auto mb-4 opacity-50">
        <p class="text-zinc-700 text-[10px] font-bold tracking-[0.3em] uppercase">&copy; 2026 NBS STUDIOS | POWERED BY ROBLOX OPEN CLOUD</p>
    </footer>

    <script>
        const PLACE_ID = "119317534126469";
        const PROXY_URL = "https://roproxy-2026.p.rapidapi.com/v1/"; // Replace with your active proxy or RoTunnel URL
        
        async function fetchGameData() {
            try {
                // 1. Get Universe ID from Place ID first
                const universeRes = await fetch(`https://apis.roproxy.com/universes/v1/places/${PLACE_ID}/universe`);
                const universeData = await universeRes.json();
                const uId = universeData.universeId;

                // 2. Get Statistics
                const statsRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${uId}`);
                const statsData = await statsRes.json();
                const game = statsData.data[0];

                // 3. Get Thumbnail
                const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/multiget/thumbnails?universeIds=${uId}&size=768x432&format=Png`);
                const thumbData = await thumbRes.json();

                // Update UI
                document.title = `NBS | ${game.name}`;
                document.getElementById('game-name').innerText = game.name;
                document.getElementById('total-playing').innerText = game.playing.toLocaleString();
                document.getElementById('game-players').innerText = game.playing.toLocaleString();
                document.getElementById('total-visits').innerText = (game.visits / 1000000).toFixed(2) + "M+";
                document.getElementById('game-link').href = `https://www.roblox.com/games/${PLACE_ID}`;
                document.getElementById('game-thumb').src = thumbData.data[0].thumbnails[0].imageUrl;
                document.getElementById('game-thumb').style.opacity = "1";

                // Market Share Math
                const ccuP = (game.playing / 11000000) * 100;
                document.getElementById('platform-ccu').innerText = ccuP.toFixed(5) + "%";
                document.getElementById('platform-dau').innerText = (ccuP * 1.8).toFixed(4) + "%";

            } catch (err) {
                console.warn("Retrying data handshake...");
                // Fallback display if proxy is slow
                document.getElementById('game-name').innerText = "REHAUL";
            }
        }

        fetchGameData();
        setInterval(fetchGameData, 60000); 
    </script>
</body>
</html>

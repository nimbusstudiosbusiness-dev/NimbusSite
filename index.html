<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBS Studios | Network Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; }
        .nbs-blue { color: #3b82f6; }
        .stat-card { border-left: 1px solid #1a1a1a; padding-left: 2rem; min-height: 80px; }
        .game-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; overflow: hidden; transition: 0.4s; }
        .game-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
        .loading-shimmer { background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center p-8 max-w-7xl mx-auto">
        <img src="https://i.postimg.cc/VLmRXK43/Group-29.png" alt="NBS Logo" class="h-10">
        <div class="hidden md:flex gap-8 font-bold uppercase tracking-tighter text-sm">
            <a href="#" class="hover:text-blue-500">Analytics</a>
            <a href="#" class="bg-blue-600 px-6 py-2 rounded-full">Group Home</a>
        </div>
    </nav>

    <header class="text-center py-20 px-4">
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-4">NEXT BIG <span class="nbs-blue">STEP.</span></h1>
        <p class="text-zinc-500 text-xl font-medium italic">2026 Platform Intelligence Dashboard</p>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-16 grid grid-cols-1 md:grid-cols-4 gap-10 border-y border-zinc-900">
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Total Playing</p>
            <h2 id="total-playing" class="text-5xl font-black mt-2">--</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Total Visits</p>
            <h2 id="total-visits" class="text-5xl font-black mt-2">--</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">% of Roblox CCU</p>
            <h2 id="platform-ccu" class="text-4xl font-black nbs-blue mt-2">0.00%</h2>
        </div>
        <div class="stat-card">
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">% of Roblox DAU</p>
            <h2 id="platform-dau" class="text-4xl font-black nbs-blue mt-2">0.00%</h2>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-24">
        <h3 class="text-sm font-black mb-12 uppercase tracking-[0.3em] text-zinc-700">Studio Portfolio</h3>
        <div id="games-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="game-card flex flex-col md:flex-row">
                <div class="md:w-1/2 h-64 bg-zinc-900 overflow-hidden">
                    <img id="game-thumb" src="" class="w-full h-full object-cover opacity-0 transition-opacity duration-1000">
                </div>
                <div class="p-8 md:w-1/2 flex flex-col justify-center">
                    <h4 id="game-name" class="text-3xl font-black uppercase tracking-tighter">Connecting...</h4>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div>
                            <p class="text-zinc-500 text-[10px] font-bold uppercase">Players</p>
                            <p id="game-players" class="text-xl font-bold">--</p>
                        </div>
                        <div>
                            <p class="text-zinc-500 text-[10px] font-bold uppercase">Likes</p>
                            <p id="game-likes" class="text-xl font-bold text-green-500">--</p>
                        </div>
                    </div>
                    <a id="game-link" href="#" class="mt-8 block text-center border border-zinc-800 py-3 rounded-xl font-bold hover:bg-white hover:text-black transition">LAUNCH</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="p-10 text-center border-t border-zinc-900 bg-zinc-950/50">
        <img src="https://i.postimg.cc/rwpNPzBj/Frame-18.png" alt="NBS Blue" class="h-8 mx-auto mb-4 opacity-50">
        <p class="text-zinc-700 text-[10px] font-bold tracking-[0.3em] uppercase">&copy; 2026 NBS STUDIOS | ALL DATA REAL-TIME VIA ROBLOX OPEN CLOUD</p>
    </footer>

    <script>
        const universeId = "9826231921";
        // 2026 Benchmarks (Approx 11M CCU)
        const PEAK_CCU = 11000000;
        const DAILY_ACTIVE = 95000000;

        async function fetchRoblox() {
            // Updated 2026 Proxy chain
            const proxies = ["https://apis.roproxy.com", "https://api.rotunnel.com/v1/proxy?url="];
            
            try {
                // Fetch Game Info
                const infoUrl = `https://games.roblox.com/v1/games?universeIds=${universeId}`;
                const response = await fetch(proxies[1] + encodeURIComponent(infoUrl));
                const data = await response.json();
                const game = data.data[0];

                // Update UI
                document.title = `NBS | ${game.name}`;
                document.getElementById('game-name').innerText = game.name;
                document.getElementById('total-playing').innerText = game.playing.toLocaleString();
                document.getElementById('game-players').innerText = game.playing.toLocaleString();
                document.getElementById('total-visits').innerText = (game.visits / 1000000).toFixed(1) + "M+";
                document.getElementById('game-link').href = `https://www.roblox.com/games/${game.rootPlaceId}`;

                // Market Share Math
                const ccuP = (game.playing / PEAK_CCU) * 100;
                const dauP = (game.playing * 14 / DAILY_ACTIVE) * 100; // Est. DAU factor
                document.getElementById('platform-ccu').innerText = ccuP.toFixed(5) + "%";
                document.getElementById('platform-dau').innerText = dauP.toFixed(4) + "%";

                // Thumbnail & Votes (Separate API calls)
                updateExtraData();
            } catch (e) {
                console.error("Link Failed. Checking backup proxy...");
            }
        }

        async function updateExtraData() {
            const proxy = "https://api.rotunnel.com/v1/proxy?url=";
            
            // Thumbnails
            const thumbUrl = encodeURIComponent(`https://thumbnails.roblox.com/v1/games/multiget/thumbnails?universeIds=${universeId}&size=768x432&format=Png`);
            const tRes = await fetch(proxy + thumbUrl);
            const tData = await tRes.json();
            const img = document.getElementById('game-thumb');
            img.src = tData.data[0].thumbnails[0].imageUrl;
            img.style.opacity = "1";

            // Votes
            const voteUrl = encodeURIComponent(`https://games.roblox.com/v1/games/votes?universeIds=${universeId}`);
            const vRes = await fetch(proxy + voteUrl);
            const vData = await vRes.json();
            const votes = vData.data[0];
            const ratio = Math.round((votes.upVotes / (votes.upVotes + votes.downVotes)) * 100);
            document.getElementById('game-likes').innerText = ratio + "%";
        }

        fetchRoblox();
        setInterval(fetchRoblox, 30000);
    </script>
</body>
</html>
